    async function inflateDashboard(payload) {
      const binary = atob(payload);
      const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
      if (!("DecompressionStream" in window)) {
        throw new Error("???????? DecompressionStream?????? Chrome?Edge ? Safari ???");
      }
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
      return await new Response(stream).text();
    }
    inflateDashboard(window.__HOT_TRENDS_DASHBOARD_GZIP__)
      .then(html => {
        document.open();
        document.write(html);
        document.close();
      })
      .catch(error => {
        document.body.innerHTML = "<pre style='white-space:pre-wrap;font-family:system-ui,sans-serif;padding:24px;color:#991b1b;'>???????"
          + String(error && error.message ? error.message : error)
          + "</pre>";
      });
  </script>
