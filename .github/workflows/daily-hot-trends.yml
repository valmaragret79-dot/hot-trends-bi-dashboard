name: Daily Hot Trends Dashboard

on:
  push:
    branches:
      - main
  schedule:
    # 22:30 Asia/Shanghai / 10:30 America/New_York during daylight saving time.
    - cron: "30 14 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date in YYYY-MM-DD. Empty means current US Eastern date."
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update dashboard data
        env:
          REPORT_DATE: ${{ github.event.inputs.report_date || '' }}
          FORCE_UPDATE: "1"
        run: node work/hot_report/cloud_update_dashboard_lite.mjs

      - name: Commit generated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/hot_trends_bi_dashboard.html outputs/hot_trends_latest.json
          git diff --cached --quiet || git commit -m "chore: update hot trends dashboard"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
